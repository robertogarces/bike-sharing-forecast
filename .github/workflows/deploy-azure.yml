name: Deploy Azure ML Endpoint

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure ML CLI extension
        run: az extension add -n ml -y

      - name: Create endpoint
        run: |
          az ml online-endpoint create \
            -f azure/endpoint.yaml \
            -g rg-bike-sharing \
            -w mlw-bike-sharing || echo "Endpoint already exists"

      - name: Grant endpoint managed identity access
        run: |
          PRINCIPAL_ID=$(az ml online-endpoint show \
            -n bike-sharing-ep \
            -g rg-bike-sharing \
            -w mlw-bike-sharing \
            --query identity.principal_id -o tsv)
          az role assignment create \
            --assignee $PRINCIPAL_ID \
            --role "AzureML Data Scientist" \
            --scope /subscriptions/c1e35fa8-f310-4b3d-b316-7a220c06c672/resourceGroups/rg-bike-sharing \
            || echo "Role already assigned"
          sleep 30

      - name: Deploy model
        run: |
          az ml online-deployment create \
            -f azure/deployment.yaml \
            -g rg-bike-sharing \
            -w mlw-bike-sharing \
            --all-traffic
