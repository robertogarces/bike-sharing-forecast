name: Hourly — Update & Predict

on:
  schedule:
    - cron: "0 * * * *"  # runs every hour at minute 0
  workflow_dispatch:       # allows manual trigger from GitHub UI

# Serialize against the weekly workflow: both push data/DVC state to main and
# would collide every Monday 00:00 UTC. Shared group name; wait rather than
# cancel so neither run's push is lost.
concurrency:
  group: main-state
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install -r requirements.txt

      - name: Configure DVC remote
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}

      - name: Configure MLflow
        run: |
          echo "MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_USERNAME=${{ secrets.DAGSHUB_USERNAME }}" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_PASSWORD=${{ secrets.DAGSHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Pull data and models from DagsHub
        run: dvc pull

      - name: Update simulation
        run: python src/bike_sharing/data/update_simulation.py

      - name: Predict next hour
        run: python src/bike_sharing/models/predict.py

      - name: Register updated files with DVC
        run: |
          dvc add data/raw/hour_past.csv \
                  data/raw/hour_future.csv \
                  data/simulation_state.json \
                  data/predictions/predictions.csv

      - name: Push updated data to DagsHub
        run: dvc push

      - name: Commit updated simulation files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/hour_past.csv.dvc data/raw/hour_future.csv.dvc data/simulation_state.json.dvc data/predictions/predictions.csv.dvc dvc.lock
          git diff --staged --quiet || git commit -m "chore: sync local state after successful hourly workflow [skip ci]"
          git push