name: Weekly — Drift Detection & Retrain

on:
  schedule:
    - cron: "0 0 * * 1"  # runs every Monday at midnight
  workflow_dispatch:       # allows manual trigger from GitHub UI

# Serialize against the hourly workflow: both push data/DVC state to main and
# would collide every Monday 00:00 UTC. Shared group name; wait rather than
# cancel so neither run's push is lost.
concurrency:
  group: main-state
  cancel-in-progress: false

# Explicit permissions block: contents:write is needed for the existing git
# push step, issues:write is new (for weekly_report.py's GitHub issue alert).
# Declaring this block replaces the default permissions entirely, so both
# must be listed even though only issues:write is new.
permissions:
  contents: write
  issues: write

jobs:
  drift_and_retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e .
          pip install -r requirements.txt

      - name: Configure DVC remote
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}

      - name: Configure MLflow
        run: |
          echo "MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_USERNAME=${{ secrets.DAGSHUB_USERNAME }}" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_PASSWORD=${{ secrets.DAGSHUB_TOKEN }}" >> $GITHUB_ENV

      - name: Pull data and models from DagsHub
        run: dvc pull

      - name: Run performance monitoring
        run: python src/bike_sharing/monitoring/performance_monitoring.py

      - name: Run drift detection
        run: python src/bike_sharing/monitoring/drift_detection.py

      - name: Retrain if drift detected
        run: python src/bike_sharing/models/retrain.py

      - name: Generate weekly report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: python src/bike_sharing/monitoring/weekly_report.py

      - name: Register retrain marker with DVC (if a retrain occurred)
        run: |
          if [ -f data/last_retrain.json ]; then
            dvc add data/last_retrain.json
          fi

      - name: Push updated models to DagsHub
        run: dvc push

      - name: Commit updated artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dvc.lock
          [ -f data/last_retrain.json.dvc ] && git add data/last_retrain.json.dvc
          [ -f artifacts/evaluation/metrics.json ] && git add artifacts/evaluation/metrics.json
          [ -f artifacts/drift/drift_detected.json ] && git add artifacts/drift/drift_detected.json
          [ -f artifacts/monitoring/performance_history.csv ] && git add artifacts/monitoring/performance_history.csv
          [ -f artifacts/monitoring/retrain_outcome.json ] && git add artifacts/monitoring/retrain_outcome.json
          [ -f artifacts/monitoring/drift_history.csv ] && git add artifacts/monitoring/drift_history.csv
          git diff --staged --quiet || git commit -m "chore: weekly drift detection and retrain [skip ci]"
          git push