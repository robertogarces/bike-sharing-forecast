stages:

  build_features:
    cmd: python src/bike_sharing/features/build_features.py
    deps:
    - configs/config.yaml
    - configs/features/default.yaml
    - data/raw/hour_past.csv
    - src/bike_sharing/features/build_features.py
    outs:
    - data/processed/train.csv
    - data/processed/val.csv

    frozen: true
  train:
    cmd: python src/bike_sharing/models/train.py
    deps:
    - src/bike_sharing/models/train.py
    - configs/config.yaml
    - configs/model/lgbm.yaml
    - data/processed/train.csv
    - data/processed/val.csv
    params:
    - configs/model/lgbm.yaml:
      - n_trials
      - random_state
      - tune
    outs:
      - artifacts/models/lgbm_registered.txt
      - artifacts/models/lgbm_casual.txt

  evaluate:
    cmd: python src/bike_sharing/models/evaluate.py
    deps:
      - src/bike_sharing/models/evaluate.py
      - configs/config.yaml
      - data/processed/val.csv
      - artifacts/models/lgbm_registered.txt
      - artifacts/models/lgbm_casual.txt
    outs:
      - artifacts/evaluation/residuals.png:
          cache: false
      - artifacts/evaluation/actual_vs_predicted.png:
          cache: false
      - artifacts/evaluation/demand_over_time.png:
          cache: false
      - artifacts/evaluation/shap_registered.png:
          cache: false
      - artifacts/evaluation/shap_casual.png:
          cache: false
    metrics:
      - artifacts/evaluation/metrics.json:
          cache: false