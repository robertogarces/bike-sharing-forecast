services:
  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  mlflow:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install mlflow && mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri /app/mlruns"
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/app/mlruns
    environment:
      - MLFLOW_ALLOW_FILE_STORE=true
    restart: unless-stopped
