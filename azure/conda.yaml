# Training environment dependencies (used by the Azure ML training job via environment.yaml).
name: bike-sharing-azure
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip:
    - lightgbm==4.6.0
    - mlflow==2.15.1
    - azureml-mlflow==1.59.0
    - hydra-core==1.3.2
    - omegaconf==2.3.0
    - pandas==2.3.3
    - numpy==1.26.4
    - scikit-learn==1.8.0
    - optuna==4.9.0
    - python-dotenv==1.2.2
    - shap==0.46.0
    - matplotlib==3.10.3
    - dvc==3.67.1
    - dvc-azure==3.1.1
    - setuptools<81

