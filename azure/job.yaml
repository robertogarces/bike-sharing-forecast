# Azure ML Command Job — runs the full training pipeline (dvc pull -> train -> evaluate) on cpu-cluster.
$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json

experiment_name: bike-sharing-forecast
display_name: lgbm-pipeline-azure
description: Full training pipeline on Azure ML — build features, train, evaluate

command: >-
  pip install -e . --quiet &&
  dvc pull build_features -r azure &&
  python src/bike_sharing/models/train.py &&
  python src/bike_sharing/models/evaluate.py

code: ..
environment: azureml:bike-sharing-env:7
compute: azureml:cpu-cluster

